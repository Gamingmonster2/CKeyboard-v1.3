      }
  });

    e.preventDefault();

    }, 3000);

        <div class="font-mono opacity-60">h.com.ly</div>
        <button id="pwa-install" class="hidden px-3 py-1 border border-shadowGold rounded text-shadowGold hover:bg-shadowGold hover:text-royalBlack transition-colors text-xs install-pulse">
            تثبيت التطبيق
        </button>
    </header>

    <!-- Main Display Area (Text Editor) -->
    <main class="w-full flex-grow flex flex-col relative mb-4 glass-panel rounded-lg overflow-hidden shadow-gold-glow scanline">
        <!-- Toolbar -->
        <div class="flex justify-between items-center p-2 border-b border-white/10 bg-black/40">
            <div class="flex gap-2">
                <button id="btn-copy" class="flex items-center gap-2 px-4 py-1.5 bg-shadowGold text-royalBlack rounded font-bold hover:bg-yellow-400 transition-colors shadow-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    نسخ الكل
                </button>
                <button id="btn-clear" class="px-3 py-1.5 border border-white/20 text-white/60 rounded hover:text-white hover:border-white transition-colors">
                    مسح
                </button>
            </div>
            <div class="flex items-center gap-2">
                <span id="status-text" class="text-xs text-shadowGold/60 hidden md:block">جاهز للكتابة...</span>
            </div>
        </div>

        <!-- Textarea -->
        <textarea id="editor" class="w-full flex-grow bg-transparent p-4 text-lg md:text-xl text-white font-mono resize-none focus:outline-none placeholder-white/20" placeholder="ابدأ الكتابة أو تحدث الآن..." spellcheck="false"></textarea>
        
        <!-- Audio Visualizer Overlay (Bottom of text area) -->
        <div class="absolute bottom-0 left-0 w-full h-16 pointer-events-none opacity-0 transition-opacity duration-300 bg-gradient-to-t from-royalBlack to-transparent" id="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>
    </main>

    <!-- Keyboard Area -->
    <section class="w-full max-w-5xl mx-auto glass-panel rounded-xl p-2 md:p-4 shadow-2xl border-t border-shadowGold/30">
        
        <!-- Keyboard Controls Row -->
        <div class="flex justify-between items-center mb-3 px-1">
            <div class="flex gap-2">
                <button id="btn-mic" class="w-10 h-10 rounded-full bg-black/50 border border-shadowGold/50 text-shadowGold flex items-center justify-center hover:bg-shadowGold hover:text-black transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
            </div>
            <div class="flex gap-2">
                 <button id="btn-lang" class="px-3 py-1 rounded bg-black/50 border border-white/10 text-xs font-bold text-shadowGold">AR</button>
            </div>
        </div>

        <!-- Keys Container -->
        <div id="keyboard-container" class="flex flex-col gap-1.5 md:gap-2 select-none">
            <!-- Keys will be injected here by JS -->
        </div>
    </section>

    <!-- JavaScript Logic -->
    <script>
        // --- Configuration & State ---
        const config = {
            clickSoundFreq: 800, // Hz
            themeColor: '#d4af37'
        };

        const state = {
            lang: 'ar', // 'ar' or 'en'
            caps: false,
            shift: false,
            isRecording: false
        };

        // --- Keyboard Layouts ---
        const layouts = {
            en: [
                ['`', '1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-', '=', 'Backspace'],
                ['Tab', 'q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p', '[', ']', '\\'],
                ['Caps Lock', 'a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l', ';', '\'', 'Enter'],
                ['Shift', 'z', 'x', 'c', 'v', 'b', 'n', 'm', ',', '.', '/', 'Shift'],
                ['Ctrl', 'Alt', 'Space', 'Alt', 'Ctrl']
            ],
            en_shift: [
                ['~', '!', '@', '#', '$', '%', '^', '&', '*', '(', ')', '_', '+', 'Backspace'],
                ['Tab', 'Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P', '{', '}', '|'],
                ['Caps Lock', 'A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', ':', '"', 'Enter'],
                ['Shift', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '<', '>', '?', 'Shift'],
                ['Ctrl', 'Alt', 'Space', 'Alt', 'Ctrl']
            ],
            ar: [
                ['ذ', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩', '٠', '-', '=', 'Backspace'],
                ['Tab', 'ض', 'ص', 'ث', 'ق', 'ف', 'غ', 'ع', 'ه', 'خ', 'ح', 'ج', 'د', '\\'],
                ['Caps Lock', 'ش', 'س', 'ي', 'ب', 'ل', 'ا', 'ت', 'ن', 'م', 'ك', 'ط', 'Enter'],
                ['Shift', 'ئ', 'ء', 'ؤ', 'ر', 'لا', 'ى', 'ة', 'و', 'ز', 'ظ', 'Shift'],
                ['Ctrl', 'Alt', 'Space', 'Alt', 'Ctrl']
            ]
        };

        // --- DOM Elements ---
        const editor = document.getElementById('editor');
        const keyboardContainer = document.getElementById('keyboard-container');
        const btnLang = document.getElementById('btn-lang');
        const btnMic = document.getElementById('btn-mic');
        const visualizerCanvas = document.getElementById('visualizer');
        const visualizerContainer = document.getElementById('visualizer-container');
        const btnCopy = document.getElementById('btn-copy');
        const btnClear = document.getElementById('btn-clear');
        const statusText = document.getElementById('status-text');

        // --- Audio Context (Mechanical Sound) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playClickSound() {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            // Create a "Thock" sound
            osc.type = 'square'; // Square wave for mechanical feel
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
            filter.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.05);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);

            osc.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.06);
        }

        // --- Keyboard Rendering ---
        function renderKeyboard() {
            keyboardContainer.innerHTML = '';
            let currentLayout;

            if (state.lang === 'ar') {
                currentLayout = layouts.ar;
                editor.dir = 'rtl';
                btnLang.textContent = 'AR';
            } else {
                if (state.shift) currentLayout = layouts.en_shift;
                else if (state.caps) currentLayout = layouts.en.map(row => row.map(k => k.length === 1 ? k.toUpperCase() : k));
                else currentLayout = layouts.en;
                editor.dir = 'ltr';
                btnLang.textContent = 'EN';
            }

            currentLayout.forEach(rowKeys => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center gap-1.5 md:gap-2 w-full';

                rowKeys.forEach(key => {
                    const btn = document.createElement('button');
                    let widthClass = 'w-10 md:w-14'; // Default key width
                    let label = key;
                    let extraClasses = '';

                    // Special Keys Styling
                    if (key === 'Backspace') { widthClass = 'w-16 md:w-24'; label = '⌫'; extraClasses = 'text-red-400'; }
                    else if (key === 'Tab') { widthClass = 'w-14 md:w-20'; label = 'Tab'; extraClasses = 'text-xs'; }
                    else if (key === 'Caps Lock') { widthClass = 'w-16 md:w-24'; label = 'Caps'; extraClasses = state.caps ? 'text-shadowGold border-shadowGold' : ''; }
                    else if (key === 'Enter') { widthClass = 'w-16 md:w-24'; label = '⏎'; extraClasses = 'text-green-400'; }
                    else if (key === 'Shift') { widthClass = 'w-16 md:w-24'; label = '⇧'; extraClasses = state.shift ? 'text-shadowGold border-shadowGold' : ''; }
                    else if (key === 'Space') { widthClass = 'flex-grow max-w-lg'; label = ''; }
                    else if (key === 'Ctrl' || key === 'Alt') { widthClass = 'w-12 md:w-16'; extraClasses = 'text-xs text-gray-400'; }

                    btn.className = `${widthClass} h-10 md:h-12 bg-gray-800 rounded border border-gray-700 text-white font-medium text-sm md:text-lg key flex items-center justify-center ${extraClasses}`;
                    btn.textContent = label;

                    // Event Listeners
                    btn.addEventListener('mousedown', (e) => {
                        e.preventDefault(); // Prevent focus loss from editor
                        handleKeyInput(key);
                        btn.classList.add('active');
                        playClickSound();
                    });
                    
                    btn.addEventListener('mouseup', () => btn.classList.remove('active'));
                    btn.addEventListener('mouseleave', () => btn.classList.remove('active'));
                    
                    // Touch support
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        handleKeyInput(key);
                        btn.classList.add('active');
                        playClickSound();
                    });
                    btn.addEventListener('touchend', () => btn.classList.remove('active'));

                    rowDiv.appendChild(btn);
                });
                keyboardContainer.appendChild(rowDiv);
            });
        }

        // --- Input Logic ---
        function handleKeyInput(key) {
            editor.focus();
            
            if (key.length === 1) {
                insertAtCursor(editor, key);
                // Reset Shift after one char if not caps lock (simple logic)
                if (state.shift) {
                    state.shift = false;
                    renderKeyboard();
                }
            } else {
                switch(key) {
                    case 'Space': insertAtCursor(editor, ' '); break;
                    case 'Backspace': 
                        const start = editor.selectionStart;
                        const end = editor.selectionEnd;
                        if(start === end && start > 0) {
                            editor.setRangeText('', start-1, end, 'end');
                        } else {
                            editor.setRangeText('', start, end, 'end');
                        }
                        break;
                    case 'Enter': insertAtCursor(editor, '\n'); break;
                    case 'Tab': insertAtCursor(editor, '    '); break;
                    case 'Caps Lock': 
                        state.caps = !state.caps; 
                        renderKeyboard(); 
                        break;
                    case 'Shift': 
                        state.shift = !state.shift; 
                        renderKeyboard(); 
                        break;
                    // Ctrl/Alt logic omitted for brevity in web context, but button feedback exists
                }
            }
        }

        function insertAtCursor(myField, myValue) {
            if (myField.selectionStart || myField.selectionStart == '0') {
                var startPos = myField.selectionStart;
                var endPos = myField.selectionEnd;
                myField.value = myField.value.substring(0, startPos)
                    + myValue
                    + myField.value.substring(endPos, myField.value.length);
                myField.selectionStart = startPos + myValue.length;
                myField.selectionEnd = startPos + myValue.length;
            } else {
                myField.value += myValue;
            }
        }

        // --- Language Toggle ---
        btnLang.addEventListener('click', () => {
            state.lang = state.lang === 'ar' ? 'en' : 'ar';
            playClickSound();
            renderKeyboard();
        });

        // --- Copy & Clear ---
        btnCopy.addEventListener('click', () => {
            editor.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            playClickSound();
            
            const originalText = btnCopy.innerHTML;
            btnCopy.innerHTML = `<span class="text-black">تم النسخ!</span>`;
            btnCopy.classList.add('bg-white');
            setTimeout(() => {
                btnCopy.innerHTML = originalText;
                btnCopy.classList.remove('bg-white');
            }, 1500);
        });

        btnClear.addEventListener('click', () => {
            if(confirm('هل أنت متأكد من مسح النص؟')) {
                editor.value = '';
                playClickSound();
            }
        });

        // --- Voice Recognition & Visualizer ---
        let recognition;
        let audioContext, analyser, dataArray, canvasCtx, visualizerAnimationId;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                state.isRecording = true;
                btnMic.classList.add('text-red-500', 'animate-pulse', 'border-red-500');
                visualizerContainer.classList.remove('opacity-0');
                statusText.textContent = "جاري الاستماع...";
                startVisualizer();
            };

            recognition.onend = () => {
                state.isRecording = false;
                btnMic.classList.remove('text-red-500', 'animate-pulse', 'border-red-500');
                visualizerContainer.classList.add('opacity-0');
                statusText.textContent = "جاهز للكتابة...";
                stopVisualizer();
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                if (finalTranscript) {
                    insertAtCursor(editor, finalTranscript + ' ');
                }
            };
        } else {
            btnMic.style.display = 'none';
            console.log("Speech Recognition API not supported.");
        }

        btnMic.addEventListener('click', () => {
            initAudio(); // Ensure context is ready
            if (state.isRecording) {
                recognition.stop();
            } else {
                recognition.lang = state.lang === 'ar' ? 'ar-SA' : 'en-US';
                recognition.start();
            }
            playClickSound();
        });

        // --- Visualizer Logic (Simulated for Mic Input) ---
        function startVisualizer() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                // In a real deployed app we would get getUserMedia stream here.
                // For this self-contained demo, we will simulate the waveform visually
                // to avoid permission blocks on non-HTTPS local files immediately.
            }
            
            const canvas = visualizerCanvas;
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            canvasCtx = canvas.getContext('2d');
            
            drawVisualizer();
        }

        function stopVisualizer() {
            cancelAnimationFrame(visualizerAnimationId);
            if(canvasCtx) canvasCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
        }

        function drawVisualizer() {
            visualizerAnimationId = requestAnimationFrame(drawVisualizer);
            
            const width = visualizerCanvas.width;
            const height = visualizerCanvas.height;
            canvasCtx.clearRect(0, 0, width, height);

            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#d4af37';
            canvasCtx.beginPath();

            const sliceWidth = width * 1.0 / 50;
            let x = 0;

            // Generate a dynamic wave based on time
            const time = Date.now() / 150; 
            
            for (let i = 0; i < 55; i++) {
                // Simulating voice data
                const v = (Math.sin((i * 0.5) + time) * Math.cos(time * 0.5)) * 0.5 + 0.5; 
                const y = v * height * 0.8 + height * 0.1; 

                if (i === 0) {
                    canvasCtx.moveTo(x, y);
                } else {
                    canvasCtx.lineTo(x, y);
                }
                x += sliceWidth;
            }

            canvasCtx.stroke();
        }

        // --- PWA Installation Logic ---
        let deferredPrompt;
        const pwaBtn = document.getElementById('pwa-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            pwaBtn.classList.remove('hidden');
        });

        pwaBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    pwaBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // --- Initialization ---
        renderKeyboard();
        
        // Handle physical keyboard typing to highlight virtual keys
        document.addEventListener('keydown', (e) => {
            editor.focus();
            // Optional: Add visual feedback to virtual keys on physical press
            // This requires mapping keycodes to our layout arrays
        });

    </script>
</body>
